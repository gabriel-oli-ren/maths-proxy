<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathsBrowser</title>
  <meta name="theme-color" content="#0d0d10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d10;
      --chrome:  #13131a;
      --surface: #1c1c26;
      --border:  #2a2a3a;
      --accent:  #7c6cfc;
      --accent2: #c084fc;
      --glow:    rgba(124,108,252,.3);
      --text:    #e8e8f2;
      --muted:   #50506a;
      --danger:  #f87171;
      --ok:      #6ee7b7;
      --mono:    "IBM Plex Mono", monospace;
      --sans:    "Syne", system-ui, sans-serif;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--sans); }

    /* ── Shell ──────────────────────────────────────────────────────────────── */
    #shell { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Chrome ─────────────────────────────────────────────────────────────── */
    #chrome {
      flex-shrink: 0;
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      padding: .5rem .7rem .4rem;
      display: flex;
      flex-direction: column;
      gap: .4rem;
      z-index: 20;
    }

    /* Logo row */
    #logo-row { display: flex; align-items: center; gap: .7rem; }
    .logo {
      font-size: .9rem; font-weight: 800; letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      white-space: nowrap;
    }
    .logo-sub { font-family: var(--mono); font-size: .58rem; color: #40405a; letter-spacing: .05em; }

    /* Toolbar */
    #toolbar { display: flex; align-items: center; gap: .35rem; }

    .nav-btn {
      display: flex; align-items: center; justify-content: center;
      width: 30px; height: 30px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); cursor: pointer; flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }
    .nav-btn:hover  { background: #23233a; border-color: var(--accent); }
    .nav-btn:active { transform: scale(.92); }
    .nav-btn:disabled { opacity: .28; cursor: default; pointer-events: none; }

    /* ── Unified smart bar ──────────────────────────────────────────────────── */
    #bar-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Mode pill (🔍 / 🔒) sits inside the input on the left */
    #bar-mode {
      position: absolute;
      left: 10px;
      font-size: 11px;
      pointer-events: none;
      z-index: 1;
      transition: opacity .2s;
    }

    #smart-bar {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .4rem 2.4rem .4rem 1.9rem;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #smart-bar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #smart-bar::placeholder { color: var(--muted); }

    #go-btn {
      position: absolute; right: 5px;
      width: 24px; height: 24px;
      background: var(--accent); border: none; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    #go-btn:hover { opacity: .82; }
    #go-btn svg { width: 11px; height: 11px; fill: #fff; }

    /* ── Autocomplete dropdown ──────────────────────────────────────────────── */
    #suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--chrome);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    #suggestions.open { display: block; }

    .sug-item {
      display: flex; align-items: center; gap: .6rem;
      padding: .5rem .9rem;
      font-family: var(--mono); font-size: .76rem;
      cursor: pointer; color: var(--text);
      transition: background .12s;
    }
    .sug-item:hover, .sug-item.active { background: var(--surface); }
    .sug-icon { font-size: .85rem; flex-shrink: 0; opacity: .7; }
    .sug-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sug-type { font-size: .65rem; color: var(--muted); flex-shrink: 0; }

    /* Progress */
    #progress-bar {
      height: 2px; width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .25s ease, opacity .4s;
      opacity: 0; border-radius: 2px;
    }
    #progress-bar.loading { opacity: 1; }

    /* ── Viewport ───────────────────────────────────────────────────────────── */
    #viewport { flex: 1; position: relative; overflow: hidden; }

    #browser-frame { width: 100%; height: 100%; border: none; background: #fff; display: block; }

    /* ── Overlay / splash ───────────────────────────────────────────────────── */
    #overlay {
      position: absolute; inset: 0;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1.4rem; text-align: center; padding: 2rem;
      transition: opacity .25s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .splash-glyph { font-size: 3.2rem; line-height: 1; }

    .splash-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem); font-weight: 800; letter-spacing: -.03em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    /* ── Big search box on splash ───────────────────────────────────────────── */
    .splash-search-wrap {
      width: 100%; max-width: 520px;
      position: relative; display: flex; align-items: center;
    }

    .splash-search-icon {
      position: absolute; left: 14px;
      font-size: 1rem; pointer-events: none;
    }

    #splash-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: .75rem 3.2rem .75rem 2.6rem;
      font-family: var(--mono); font-size: .9rem;
      color: var(--text); outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #splash-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    #splash-input::placeholder { color: var(--muted); }

    #splash-go {
      position: absolute; right: 8px;
      background: var(--accent); border: none; border-radius: 50%;
      width: 34px; height: 34px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    #splash-go:hover { opacity: .82; }
    #splash-go svg { fill: #fff; width: 14px; height: 14px; }

    /* Engine selector */
    .engine-row {
      display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; justify-content: center;
    }
    .engine-label { font-family: var(--mono); font-size: .65rem; color: var(--muted); }
    .engine-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: .25rem .75rem; font-family: var(--mono); font-size: .7rem; color: #9090b8;
      cursor: pointer; transition: border-color .15s, color .15s, background .15s;
    }
    .engine-btn:hover   { border-color: var(--accent); color: var(--accent); }
    .engine-btn.active  { background: rgba(124,108,252,.18); border-color: var(--accent); color: var(--accent); }

    /* Quick links */
    .splash-sub { font-family: var(--mono); font-size: .72rem; color: var(--muted); }
    .quick-links { display: flex; flex-wrap: wrap; gap: .4rem; justify-content: center; }
    .quick-link {
      background: var(--surface); border: 1px solid var(--border); border-radius: 20px;
      padding: .27rem .8rem; font-family: var(--mono); font-size: .7rem; color: #8080a8;
      cursor: pointer; transition: border-color .15s, color .15s;
    }
    .quick-link:hover { border-color: var(--accent); color: var(--accent); }

    #splash-error { color: var(--danger); font-family: var(--mono); font-size: .78rem; display: none; }

    /* ── Status bar ─────────────────────────────────────────────────────────── */
    #statusbar {
      flex-shrink: 0; background: var(--chrome); border-top: 1px solid var(--border);
      padding: .2rem .9rem; font-family: var(--mono); font-size: .65rem; color: var(--muted);
      display: flex; justify-content: space-between; align-items: center;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="shell">

  <!-- ── Chrome ─────────────────────────────────────────────────────────────── -->
  <div id="chrome">
    <div id="logo-row">
      <span class="logo">⬡ MathsBrowser</span>
      <span class="logo-sub">Cloudflare Worker · Brave Search</span>
    </div>

    <div id="toolbar">
      <button class="nav-btn" id="btn-back" title="Back" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-fwd" title="Forward" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="nav-btn" id="btn-reload" title="Reload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>

      <!-- Smart address / search bar -->
      <div id="bar-wrap">
        <span id="bar-mode">🔍</span>
        <input id="smart-bar" type="text"
               placeholder="Search or enter a URL…"
               spellcheck="false" autocomplete="off" autocorrect="off" />
        <button id="go-btn" title="Go">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>

        <!-- Autocomplete suggestions -->
        <div id="suggestions"></div>
      </div>

      <button class="nav-btn" id="btn-home" title="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="15" height="15">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
    </div>

    <div id="progress-bar"></div>
  </div>

  <!-- ── Viewport ───────────────────────────────────────────────────────────── -->
  <div id="viewport">

    <!-- Splash screen -->
    <div id="overlay">
      <div class="splash-glyph">⬡</div>
      <div class="splash-title">MathsBrowser</div>

      <!-- Big splash search box -->
      <div class="splash-search-wrap">
        <span class="splash-search-icon">🔍</span>
        <input id="splash-input" type="text" placeholder="Search the web or enter a URL…"
               spellcheck="false" autocomplete="off" autocorrect="off" />
        <button id="splash-go">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Engine selector -->
      <div class="engine-row">
        <span class="engine-label">Search engine:</span>
        <button class="engine-btn active" data-engine="brave">🦁 Brave</button>
        <button class="engine-btn" data-engine="ddg">🦆 DuckDuckGo</button>
        <button class="engine-btn" data-engine="startpage">🕵️ Startpage</button>
        <button class="engine-btn" data-engine="ecosia">🌿 Ecosia</button>
      </div>

      <!-- Quick links -->
      <div class="splash-sub">Quick links</div>
      <div class="quick-links">
        <span class="quick-link" data-url="https://wikipedia.org">Wikipedia</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">Hacker News</span>
        <span class="quick-link" data-url="https://mathssupport.cat">MathsSupport</span>
        <span class="quick-link" data-url="https://arxiv.org">arXiv</span>
        <span class="quick-link" data-url="https://github.com">GitHub</span>
        <span class="quick-link" data-url="https://bbc.com/news">BBC News</span>
      </div>

      <div id="splash-error"></div>
    </div>

    <iframe id="browser-frame"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation-by-user-activation"
            title="Proxy Browser"></iframe>
  </div>

  <!-- ── Status bar ───────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="status-left">Ready — type a search or URL above</span>
    <span id="status-right">search.mathssupport.cat · Brave Search</span>
  </div>

</div>
<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PROXY = "https://search.mathssupport.cat";

const ENGINES = {
  brave:     { name: "Brave Search",  url: q => `https://search.brave.com/search?q=${encodeURIComponent(q)}` },
  ddg:       { name: "DuckDuckGo",    url: q => `https://duckduckgo.com/?q=${encodeURIComponent(q)}` },
  startpage: { name: "Startpage",     url: q => `https://www.startpage.com/search?q=${encodeURIComponent(q)}` },
  ecosia:    { name: "Ecosia",        url: q => `https://www.ecosia.org/search?q=${encodeURIComponent(q)}` },
};

let activeEngine = "brave";

// ── State ────────────────────────────────────────────────────────────────────
const navHistory = [];
let histIdx  = -1;
let sugIdx   = -1; // keyboard selection in suggestions

// ── Elements ─────────────────────────────────────────────────────────────────
const frame       = document.getElementById("browser-frame");
const smartBar    = document.getElementById("smart-bar");
const barMode     = document.getElementById("bar-mode");
const overlay     = document.getElementById("overlay");
const splashInput = document.getElementById("splash-input");
const splashError = document.getElementById("splash-error");
const progress    = document.getElementById("progress-bar");
const statusLeft  = document.getElementById("status-left");
const statusRight = document.getElementById("status-right");
const sugBox      = document.getElementById("suggestions");
const btnBack     = document.getElementById("btn-back");
const btnFwd      = document.getElementById("btn-fwd");

// ── URL detection ─────────────────────────────────────────────────────────────
function looksLikeURL(s) {
  s = s.trim();
  if (/^https?:\/\/.+/i.test(s)) return true;
  // Has a TLD-like structure and no spaces
  if (!s.includes(" ") && /^[a-zA-Z0-9-]+(\.[a-zA-Z]{2,})(\/.*)?$/.test(s)) return true;
  return false;
}

// ── Smart dispatch ────────────────────────────────────────────────────────────
function dispatch(raw) {
  raw = raw.trim();
  if (!raw) return;
  closeSuggestions();

  if (looksLikeURL(raw)) {
    let url = raw;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    navigate(url);
  } else {
    search(raw);
  }
}

function search(query) {
  const searchURL = ENGINES[activeEngine].url(query);
  smartBar.value = query;
  barMode.textContent = "🔍";
  navigate(searchURL, true, query);
}

function navigate(rawURL, pushHist = true, displayLabel = null) {
  let url = rawURL.trim();
  if (!/^https?:\/\//i.test(url)) url = "https://" + url;

  try { new URL(url); } catch {
    showSplashError("Invalid URL: " + url); return;
  }

  const proxyURL = `${PROXY}/?url=${encodeURIComponent(url)}`;

  if (pushHist) {
    navHistory.splice(histIdx + 1);
    navHistory.push({ proxyURL, realURL: url, label: displayLabel || url });
    histIdx = navHistory.length - 1;
  }

  updateNavBtns();
  smartBar.value = displayLabel || url;
  barMode.textContent = url.startsWith("https://") ? "🔒" : "🔓";
  setLoading(true);
  hideOverlay();
  frame.src = proxyURL;
  statusLeft.textContent = "Connecting to " + new URL(url).hostname + "…";
}

function goBack() {
  if (histIdx <= 0) return;
  histIdx--;
  applyHistory();
}
function goForward() {
  if (histIdx >= navHistory.length - 1) return;
  histIdx++;
  applyHistory();
}
function applyHistory() {
  const h = navHistory[histIdx];
  smartBar.value = h.label || h.realURL;
  barMode.textContent = h.realURL.startsWith("https://") ? "🔒" : "🔓";
  setLoading(true);
  frame.src = h.proxyURL;
  updateNavBtns();
}
function reload() {
  if (frame.src && frame.src !== "about:blank") { setLoading(true); frame.src = frame.src; }
}
function goHome() {
  frame.src = "about:blank";
  smartBar.value = "";
  barMode.textContent = "🔍";
  showOverlay();
  statusLeft.textContent = "Ready — type a search or URL above";
}

// ── Engine switching ──────────────────────────────────────────────────────────
document.querySelectorAll(".engine-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".engine-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeEngine = btn.dataset.engine;
    statusRight.textContent = `search.mathssupport.cat · ${ENGINES[activeEngine].name}`;
  });
});

// ── Progress ──────────────────────────────────────────────────────────────────
let progressTimer;
function setLoading(v) {
  clearInterval(progressTimer);
  if (v) {
    let w = 12;
    progress.style.width = w + "%"; progress.classList.add("loading");
    progressTimer = setInterval(() => {
      if (w < 82) { w += Math.random() * 9; progress.style.width = Math.min(w,82) + "%"; }
    }, 280);
  } else {
    progress.style.width = "100%";
    setTimeout(() => { progress.classList.remove("loading"); progress.style.width = "0%"; }, 380);
  }
}

// ── Suggestions ───────────────────────────────────────────────────────────────
// Brave Search has no public autocomplete API without CORS, so we generate
// local suggestions: search shortcuts, popular URLs, or plain search intent.
function buildSuggestions(val) {
  if (!val || val.length < 2) return [];
  const items = [];

  if (looksLikeURL(val)) {
    let url = val;
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;
    items.push({ icon: "🌐", label: url, type: "Navigate", action: () => navigate(url) });
  }

  // Always offer a search option
  items.push({
    icon: engineIcon(activeEngine),
    label: `Search "${val}"`,
    type: ENGINES[activeEngine].name,
    action: () => search(val),
  });

  // Offer alternate engines quickly
  Object.entries(ENGINES).forEach(([key, eng]) => {
    if (key !== activeEngine) {
      items.push({
        icon: engineIcon(key),
        label: `Search "${val}" on ${eng.name}`,
        type: "Alt engine",
        action: () => {
          const url = eng.url(val);
          navigate(url, true, val);
        }
      });
    }
  });

  return items;
}

function engineIcon(key) {
  return { brave: "🦁", ddg: "🦆", startpage: "🕵️", ecosia: "🌿" }[key] || "🔍";
}

function renderSuggestions(items) {
  sugBox.innerHTML = "";
  sugIdx = -1;
  if (!items.length) { closeSuggestions(); return; }
  items.forEach((item, i) => {
    const el = document.createElement("div");
    el.className = "sug-item";
    el.innerHTML = `<span class="sug-icon">${item.icon}</span>
                    <span class="sug-label">${item.label}</span>
                    <span class="sug-type">${item.type}</span>`;
    el.addEventListener("mousedown", (e) => { e.preventDefault(); item.action(); });
    sugBox.appendChild(el);
  });
  sugBox.classList.add("open");
}

function closeSuggestions() { sugBox.classList.remove("open"); sugBox.innerHTML = ""; sugIdx = -1; }

function moveSug(dir) {
  const items = sugBox.querySelectorAll(".sug-item");
  if (!items.length) return;
  items[sugIdx]?.classList.remove("active");
  sugIdx = (sugIdx + dir + items.length) % items.length;
  items[sugIdx].classList.add("active");
}

// ── Smart bar events ──────────────────────────────────────────────────────────
smartBar.addEventListener("input", () => {
  const val = smartBar.value;
  barMode.textContent = looksLikeURL(val) ? "🔒" : "🔍";
  renderSuggestions(buildSuggestions(val));
});

smartBar.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown") { e.preventDefault(); moveSug(1); return; }
  if (e.key === "ArrowUp")   { e.preventDefault(); moveSug(-1); return; }
  if (e.key === "Escape")    { closeSuggestions(); return; }
  if (e.key === "Enter") {
    if (sugIdx >= 0) {
      sugBox.querySelectorAll(".sug-item")[sugIdx]?.dispatchEvent(new MouseEvent("mousedown"));
    } else {
      dispatch(smartBar.value);
    }
  }
});

smartBar.addEventListener("focus",  () => { if (smartBar.value) renderSuggestions(buildSuggestions(smartBar.value)); });
smartBar.addEventListener("blur",   () => setTimeout(closeSuggestions, 150));
document.getElementById("go-btn").addEventListener("click", () => dispatch(smartBar.value));

// ── Splash input ──────────────────────────────────────────────────────────────
splashInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") dispatch(splashInput.value);
});
document.getElementById("splash-go").addEventListener("click", () => dispatch(splashInput.value));

// Sync splash input ↔ smart bar
splashInput.addEventListener("input", () => { smartBar.value = splashInput.value; });
smartBar.addEventListener("input",    () => { splashInput.value = smartBar.value; });

// ── Nav buttons ───────────────────────────────────────────────────────────────
btnBack.addEventListener("click", goBack);
btnFwd.addEventListener("click", goForward);
document.getElementById("btn-reload").addEventListener("click", reload);
document.getElementById("btn-home").addEventListener("click", goHome);

function updateNavBtns() {
  btnBack.disabled = histIdx <= 0;
  btnFwd.disabled  = histIdx >= navHistory.length - 1;
}

// ── Quick links ───────────────────────────────────────────────────────────────
document.querySelectorAll(".quick-link").forEach(el =>
  el.addEventListener("click", () => navigate(el.dataset.url))
);

// ── Frame events ──────────────────────────────────────────────────────────────
frame.addEventListener("load", () => {
  if (!frame.src || frame.src === "about:blank") return;
  let title = "";
  try { title = frame.contentDocument?.title || ""; } catch {}
  setLoading(false);
  statusLeft.textContent = title ? `✓ ${title}` : "✓ Loaded";
});

// ── postMessage from proxied pages ────────────────────────────────────────────
window.addEventListener("message", (e) => {
  if (e.origin !== PROXY && e.origin !== location.origin) return;
  const { type, url } = e.data || {};
  if (type === "PROXY_NAV" && url) {
    const real = (() => { try { return new URL(url).searchParams.get("url") || url; } catch { return url; } })();
    smartBar.value = real;
    splashInput.value = real;
    barMode.textContent = real.startsWith("https://") ? "🔒" : "🔓";
    navHistory.splice(histIdx + 1);
    navHistory.push({ proxyURL: url, realURL: real, label: real });
    histIdx = navHistory.length - 1;
    updateNavBtns();
    setLoading(true);
    frame.src = url;
    statusLeft.textContent = "Navigating…";
  }
  if (type === "PROXY_URL" && url) {
    const real = (() => { try { return new URL(url).searchParams.get("url") || url; } catch { return url; } })();
    smartBar.value = real;
    splashInput.value = real;
  }
});

// ── Overlay helpers ───────────────────────────────────────────────────────────
function showOverlay() { overlay.classList.remove("hidden"); splashError.style.display = "none"; splashInput.focus(); }
function hideOverlay()  { overlay.classList.add("hidden"); }
function showSplashError(msg) { splashError.textContent = msg; splashError.style.display = "block"; }

// ── Init ──────────────────────────────────────────────────────────────────────
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js", { scope: "./" })
    .then(() => console.log("[SW] Registered"))
    .catch(e => console.warn("[SW] Failed:", e));
}

splashInput.focus();
</script>
</body>
</html>
