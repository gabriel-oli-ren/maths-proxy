<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathSupport Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e17;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #e6edf3;
    }
    .navbar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 72px;
      background: #0f1420;
      border-right: 1px solid #2a303c;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      transition: width 0.2s ease;
      z-index: 100;
      overflow-x: hidden;
    }
    .navbar.expanded { width: 240px; }
    .nav-brand {
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .nav-brand img { width: 40px; height: 40px; border-radius: 12px; }
    .nav-brand span { display: none; margin-left: 12px; font-weight: 600; }
    .navbar.expanded .nav-brand span { display: inline; }
    .nav-item {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 10px 16px;
      margin: 4px 0;
      color: #b3c0d2;
      text-decoration: none;
      border-radius: 12px;
      cursor: pointer;
    }
    .nav-item:hover { background: #1e2538; color: white; }
    .nav-item .material-symbols-outlined { font-size: 24px; min-width: 40px; text-align: center; }
    .nav-item span:last-child { margin-left: 8px; display: none; }
    .navbar.expanded .nav-item span:last-child { display: inline; }
    .nav-footer { margin-top: auto; width: 100%; }
    .app-container { margin-left: 72px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .tab-bar {
      background: #0f1420;
      border-bottom: 1px solid #2a303c;
      padding: 8px 12px 0 12px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }
    .tab {
      background: #1a1f2e;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active { background: #0a0e17; border-bottom-color: #2f81f7; }
    .tab-title { font-size: 0.8rem; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
    .tab-close {
      background: none;
      border: none;
      color: #8b949e;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0 4px;
    }
    .new-tab-btn {
      background: #1a1f2e;
      border: none;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 16px;
      border-radius: 8px;
    }
    .browser-nav {
      background: #0a0e17;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      border-bottom: 1px solid #2a303c;
    }
    .nav-controls { display: flex; gap: 6px; }
    .nav-btn {
      background: #1a1f2e;
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
    }
    .address-bar {
      flex: 1;
      display: flex;
      align-items: center;
      background: #1a1f2e;
      border-radius: 24px;
      padding: 4px 12px;
      gap: 8px;
    }
    .address-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 0.9rem;
      padding: 8px 0;
      outline: none;
    }
    .browser-content { flex: 1; position: relative; background: white; }
    .browser-iframe { width: 100%; height: 100%; border: none; display: block; }
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10,14,23,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      backdrop-filter: blur(4px);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #2a303c;
      border-top-color: #2f81f7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none; }
    .toggle-sidebar {
      position: fixed;
      left: 8px;
      top: 12px;
      z-index: 200;
      background: #1a1f2e;
      border: none;
      color: white;
      padding: 6px;
      border-radius: 8px;
      cursor: pointer;
      display: none;
    }
    @media (max-width: 768px) {
      .navbar { width: 0; }
      .app-container { margin-left: 0; }
      .toggle-sidebar { display: block; }
      .navbar.expanded { width: 240px; }
    }
  </style>
</head>
<body>
<button class="toggle-sidebar" id="toggle-sidebar">☰</button>
<div class="navbar" id="sidebar">
  <div class="nav-brand">
    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%232f81f7'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z'/%3E%3C/svg%3E" alt="Logo">
    <span>MathSupport</span>
  </div>
  <div class="nav-item" id="nav-home"><span class="material-symbols-outlined">home</span><span>Inicio</span></div>
  <div class="nav-item" id="nav-games"><span class="material-symbols-outlined">sports_esports</span><span>Juegos</span></div>
  <div class="nav-footer"><div class="nav-item" id="nav-settings"><span class="material-symbols-outlined">settings</span><span>Ajustes</span></div></div>
</div>

<div class="app-container">
  <div class="tab-bar" id="tab-bar">
    <div class="tab active" data-tab-id="0"><span class="tab-title">New Tab</span><button class="tab-close">×</button></div>
    <button class="new-tab-btn" id="new-tab-btn">+</button>
  </div>
  <div class="browser-nav">
    <div class="nav-controls">
      <button class="nav-btn" id="nav-reload">⟳</button>
      <button class="nav-btn" id="nav-fullscreen">⛶</button>
    </div>
    <div class="address-bar">
      <div class="address-favicon" id="address-favicon">🌐</div>
      <input type="text" class="address-input" id="address-input" placeholder="Escribe una URL o busca" autocomplete="off">
    </div>
  </div>
  <div class="browser-content" id="browser-content">
    <div class="loading-overlay hidden" id="loading-overlay"><div class="loading-spinner"></div><div style="margin-top:12px;">Cargando...</div></div>
    <iframe id="proxy-iframe" class="browser-iframe" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-pointer-lock allow-top-navigation-by-user-activation" allowfullscreen></iframe>
  </div>
</div>

<script>
  const WORKER_URL = 'https://search.mathssupport.cat';
  let iframe = document.getElementById('proxy-iframe');
  let addressInput = document.getElementById('address-input');
  let loadingOverlay = document.getElementById('loading-overlay');
  let tabsMap = new Map();
  let currentTabId = 0;
  let nextTabId = 1;

  function showLoading(show) {
    if (show) loadingOverlay.classList.remove('hidden');
    else loadingOverlay.classList.add('hidden');
  }

  function loadUrlInIframe(iframeElem, url) {
    if (!url) return;
    let fullUrl = url.trim();
    if (!fullUrl.startsWith('http')) fullUrl = 'https://' + fullUrl;
    const proxyUrl = `${WORKER_URL}/?url=${encodeURIComponent(fullUrl)}`;
    iframeElem.src = proxyUrl;
    showLoading(true);
    iframeElem.onload = () => showLoading(false);
    iframeElem.onerror = () => showLoading(false);
    return fullUrl;
  }

  function createTab(url = null, title = 'New Tab') {
    const id = nextTabId++;
    const tabDiv = document.createElement('div');
    tabDiv.className = 'tab';
    tabDiv.dataset.tabId = id;
    tabDiv.innerHTML = `<span class="tab-title">${escapeHtml(title)}</span><button class="tab-close">×</button>`;
    document.getElementById('tab-bar').insertBefore(tabDiv, document.getElementById('new-tab-btn'));
    const newIframe = document.createElement('iframe');
    newIframe.className = 'browser-iframe';
    newIframe.setAttribute('sandbox', 'allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads allow-pointer-lock allow-top-navigation-by-user-activation');
    newIframe.setAttribute('allowfullscreen', 'true');
    newIframe.style.display = 'none';
    document.getElementById('browser-content').appendChild(newIframe);
    const defaultUrl = url || 'https://example.com';
    const actualUrl = loadUrlInIframe(newIframe, defaultUrl);
    tabsMap.set(id, { iframe: newIframe, url: actualUrl, title: actualUrl || title });
    return id;
  }

  function switchTab(id) {
    if (currentTabId === id) return;
    const current = tabsMap.get(currentTabId);
    if (current) current.iframe.style.display = 'none';
    const next = tabsMap.get(id);
    if (next) {
      next.iframe.style.display = 'block';
      currentTabId = id;
      addressInput.value = next.url || '';
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      const activeTab = document.querySelector(`.tab[data-tab-id="${id}"]`);
      if (activeTab) activeTab.classList.add('active');
      // Si el iframe no tiene contenido, recargar
      if (!next.iframe.src || next.iframe.src === 'about:blank') {
        if (next.url) loadUrlInIframe(next.iframe, next.url);
      }
    }
  }

  function closeTab(id) {
    if (tabsMap.size <= 1) {
      // Limpiar en lugar de cerrar la última
      const tab = tabsMap.get(id);
      if (tab) {
        loadUrlInIframe(tab.iframe, 'https://example.com');
        tab.url = 'https://example.com';
        tab.title = 'New Tab';
        const tabElem = document.querySelector(`.tab[data-tab-id="${id}"]`);
        if (tabElem) tabElem.querySelector('.tab-title').textContent = 'New Tab';
      }
      return;
    }
    const tab = tabsMap.get(id);
    if (tab) {
      tab.iframe.remove();
      tabsMap.delete(id);
    }
    const tabElem = document.querySelector(`.tab[data-tab-id="${id}"]`);
    if (tabElem) tabElem.remove();
    const remaining = Array.from(tabsMap.keys());
    if (remaining.length) switchTab(remaining[0]);
    else createTab();
  }

  function navigateCurrentTab(rawUrl) {
    let fullUrl = rawUrl.trim();
    if (!fullUrl.startsWith('http')) fullUrl = 'https://' + fullUrl;
    const tab = tabsMap.get(currentTabId);
    if (tab) {
      tab.url = fullUrl;
      tab.title = fullUrl.length > 30 ? fullUrl.slice(0,30)+'...' : fullUrl;
      const tabElem = document.querySelector(`.tab[data-tab-id="${currentTabId}"]`);
      if (tabElem) tabElem.querySelector('.tab-title').textContent = tab.title;
      addressInput.value = fullUrl;
      loadUrlInIframe(tab.iframe, fullUrl);
    }
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Eventos
  document.getElementById('nav-reload').onclick = () => {
    const tab = tabsMap.get(currentTabId);
    if (tab && tab.url) loadUrlInIframe(tab.iframe, tab.url);
  };
  document.getElementById('nav-fullscreen').onclick = () => {
    const container = document.querySelector('.app-container');
    if (container.requestFullscreen) container.requestFullscreen();
  };
  addressInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') navigateCurrentTab(addressInput.value);
  });
  document.getElementById('new-tab-btn').onclick = () => {
    const newId = createTab();
    switchTab(newId);
  };
  document.getElementById('toggle-sidebar').onclick = () => {
    document.getElementById('sidebar').classList.toggle('expanded');
  };
  document.getElementById('tab-bar').addEventListener('click', (e) => {
    const tabDiv = e.target.closest('.tab');
    if (!tabDiv) return;
    const id = parseInt(tabDiv.dataset.tabId);
    if (e.target.classList.contains('tab-close')) {
      e.stopPropagation();
      closeTab(id);
    } else {
      switchTab(id);
    }
  });

  // Inicializar primera pestaña
  const firstId = createTab('https://example.com', 'Inicio');
  currentTabId = firstId;
  const firstTabElem = document.querySelector(`.tab[data-tab-id="${firstId}"]`);
  if (firstTabElem) firstTabElem.classList.add('active');
  addressInput.value = 'https://example.com';
</script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e => console.error('SW error', e));
  }
</script>
</body>
</html>
