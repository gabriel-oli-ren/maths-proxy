<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MathSupport Proxy</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background: #0a0e17; font-family: monospace; }
    .bar {
      background: #0f1420;
      padding: 10px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #2a303c;
      position: sticky;
      top: 0;
    }
    input {
      flex: 1;
      background: #1a1f2e;
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 24px;
      outline: none;
    }
    button {
      background: #1a1f2e;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 24px;
      cursor: pointer;
    }
    #content {
      width: 100%;
      min-height: calc(100vh - 48px);
    }
  </style>
</head>
<body>
<div class="bar">
  <input type="text" id="urlInput" placeholder="https://freezenova.com" autocomplete="off">
  <button id="goBtn">Ir</button>
</div>
<div id="content">Cargando...</div>

<script>
  const WORKER = 'https://search.mathssupport.cat';
  const input = document.getElementById('urlInput');
  const goBtn = document.getElementById('goBtn');
  const contentDiv = document.getElementById('content');

  async function loadUrl(url) {
    if (!url.startsWith('http')) url = 'https://' + url;
    contentDiv.innerHTML = '<div style="color:white; padding:20px;">Cargando...</div>';
    try {
      const proxyUrl = `${WORKER}/?url=${encodeURIComponent(url)}`;
      const response = await fetch(proxyUrl);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const html = await response.text();
      // Inyectar el HTML directamente
      contentDiv.innerHTML = html;
      // Reescribir enlaces dentro del contenido para que sigan usando el proxy
      contentDiv.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && href.startsWith('http')) {
          a.href = `javascript:void(0)`;
          a.onclick = (e) => {
            e.preventDefault();
            loadUrl(href);
            input.value = href;
          };
        }
      });
      // Actualizar barra de direcciones
      input.value = url;
    } catch (err) {
      contentDiv.innerHTML = `<div style="color:red; padding:20px;">Error: ${err.message}</div>`;
    }
  }

  goBtn.onclick = () => loadUrl(input.value);
  input.onkeypress = (e) => { if (e.key === 'Enter') loadUrl(input.value); };
  
  // Cargar una web de ejemplo
  loadUrl('https://example.com');
</script>
</body>
</html>
