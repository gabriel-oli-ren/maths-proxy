<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MathsSupport Browser</title>
  <meta name="theme-color" content="#0d0d10" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d10;
      --chrome:    #13131a;
      --surface:   #1c1c26;
      --border:    #2a2a3a;
      --accent:    #7c6cfc;
      --accent2:   #c084fc;
      --glow:      rgba(124,108,252,.35);
      --text:      #e8e8f2;
      --muted:     #6060808;
      --danger:    #f87171;
      --success:   #6ee7b7;
      --r:         8px;
      --mono:      "IBM Plex Mono", monospace;
      --sans:      "Syne", system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    /* ── Shell ─────────────────────────────────────────────────────────────── */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Top chrome ────────────────────────────────────────────────────────── */
    #chrome {
      flex-shrink: 0;
      background: var(--chrome);
      border-bottom: 1px solid var(--border);
      padding: .55rem .75rem .55rem;
      display: flex;
      flex-direction: column;
      gap: .45rem;
      z-index: 10;
    }

    /* title row */
    #title-row {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .logo {
      font-size: .95rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
    }

    .logo-sub {
      font-family: var(--mono);
      font-size: .6rem;
      color: #505068;
      letter-spacing: .05em;
    }

    /* ── Toolbar ───────────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
      font-size: 14px;
    }
    .nav-btn:hover  { background: #25253a; border-color: var(--accent); }
    .nav-btn:active { transform: scale(.93); }
    .nav-btn:disabled { opacity: .3; cursor: default; pointer-events: none; }

    /* address bar */
    #addr-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    #lock-icon {
      position: absolute;
      left: 10px;
      font-size: 11px;
      color: var(--success);
      pointer-events: none;
    }

    #addr {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .42rem 2.6rem .42rem 2rem;
      font-family: var(--mono);
      font-size: .78rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    #addr:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #go-btn {
      position: absolute;
      right: 6px;
      width: 24px; height: 24px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s;
    }
    #go-btn:hover { opacity: .85; }
    #go-btn svg { width: 12px; height: 12px; fill: #fff; }

    /* ── Progress bar ──────────────────────────────────────────────────────── */
    #progress-bar {
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width .25s ease, opacity .4s;
      opacity: 0;
      border-radius: 2px;
    }
    #progress-bar.loading { opacity: 1; }

    /* ── Viewport ──────────────────────────────────────────────────────────── */
    #viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #browser-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
      display: block;
    }

    /* ── Splash / error overlay ────────────────────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      text-align: center;
      padding: 2rem;
      transition: opacity .3s;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }

    .splash-icon {
      font-size: 3.5rem;
      line-height: 1;
    }

    .splash-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -.02em;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .splash-sub {
      font-family: var(--mono);
      font-size: .78rem;
      color: #50506a;
      max-width: 400px;
      line-height: 1.6;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin-top: .5rem;
    }

    .quick-link {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: .3rem .9rem;
      font-family: var(--mono);
      font-size: .72rem;
      color: #9090b8;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .quick-link:hover { border-color: var(--accent); color: var(--accent); }

    #error-msg {
      color: var(--danger);
      font-family: var(--mono);
      font-size: .8rem;
      max-width: 500px;
      display: none;
    }

    /* ── Status bar ────────────────────────────────────────────────────────── */
    #statusbar {
      flex-shrink: 0;
      background: var(--chrome);
      border-top: 1px solid var(--border);
      padding: .22rem .9rem;
      font-family: var(--mono);
      font-size: .68rem;
      color: #50506a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  </style>
</head>
<body>

<div id="shell">

  <!-- ── Chrome ───────────────────────────────────────────────────────────── -->
  <div id="chrome">
    <div id="title-row">
      <span class="logo">⬡ MathsBrowser</span>
      <span class="logo-sub">Powered by Cloudflare Workers</span>
    </div>

    <div id="toolbar">
      <!-- Back -->
      <button class="nav-btn" id="btn-back" title="Back" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <!-- Forward -->
      <button class="nav-btn" id="btn-fwd" title="Forward" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

      <!-- Reload / Stop -->
      <button class="nav-btn" id="btn-reload" title="Reload">
        <svg id="ico-reload" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>

      <!-- Address bar -->
      <div id="addr-wrap">
        <span id="lock-icon">🔒</span>
        <input id="addr" type="text" placeholder="Enter a URL — e.g. https://example.com" spellcheck="false" autocomplete="off" />
        <button id="go-btn" title="Go">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>

      <!-- Home -->
      <button class="nav-btn" id="btn-home" title="New tab">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="16" height="16">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
    </div>

    <div id="progress-bar"></div>
  </div>

  <!-- ── Viewport ─────────────────────────────────────────────────────────── -->
  <div id="viewport">

    <div id="overlay">
      <div class="splash-icon">🌐</div>
      <div class="splash-title">MathsBrowser</div>
      <div class="splash-sub">
        Type any URL in the address bar above to browse the web<br/>
        through the Cloudflare Worker proxy.
      </div>
      <div class="quick-links">
        <span class="quick-link" data-url="https://wikipedia.org">Wikipedia</span>
        <span class="quick-link" data-url="https://news.ycombinator.com">Hacker News</span>
        <span class="quick-link" data-url="https://example.com">Example.com</span>
        <span class="quick-link" data-url="https://mathssupport.cat">MathsSupport</span>
      </div>
      <div id="error-msg"></div>
    </div>

    <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups" title="Proxy Browser"></iframe>
  </div>

  <!-- ── Status bar ─────────────────────────────────────────────────────── -->
  <div id="statusbar">
    <span id="status-left">Ready</span>
    <span id="status-right">search.mathssupport.cat</span>
  </div>

</div>

<script>
  const PROXY = "https://search.mathssupport.cat";

  // ── State ───────────────────────────────────────────────────────────────────
  const history = [];
  let historyIdx = -1;
  let isLoading  = false;

  // ── Elements ────────────────────────────────────────────────────────────────
  const frame      = document.getElementById("browser-frame");
  const addr       = document.getElementById("addr");
  const overlay    = document.getElementById("overlay");
  const errorMsg   = document.getElementById("error-msg");
  const progress   = document.getElementById("progress-bar");
  const statusLeft = document.getElementById("status-left");
  const btnBack    = document.getElementById("btn-back");
  const btnFwd     = document.getElementById("btn-fwd");
  const btnReload  = document.getElementById("btn-reload");

  // ── Navigation ──────────────────────────────────────────────────────────────
  function navigate(rawURL, pushHistory = true) {
    let url = rawURL.trim();
    if (!url) return;

    // Auto-prefix scheme
    if (!/^https?:\/\//i.test(url)) url = "https://" + url;

    // Validate
    try { new URL(url); } catch {
      showError("Invalid URL: " + url);
      return;
    }

    const proxyURL = `${PROXY}/?url=${encodeURIComponent(url)}`;

    if (pushHistory) {
      history.splice(historyIdx + 1);
      history.push(proxyURL);
      historyIdx = history.length - 1;
    }

    updateNavButtons();
    addr.value = url;
    setLoading(true);
    hideOverlay();

    frame.src = proxyURL;
    statusLeft.textContent = "Connecting to " + new URL(url).hostname + "…";
  }

  function goBack() {
    if (historyIdx <= 0) return;
    historyIdx--;
    const url = history[historyIdx];
    const realURL = new URL(url).searchParams.get("url") || url;
    addr.value = realURL;
    setLoading(true);
    frame.src = url;
    updateNavButtons();
  }

  function goForward() {
    if (historyIdx >= history.length - 1) return;
    historyIdx++;
    const url = history[historyIdx];
    const realURL = new URL(url).searchParams.get("url") || url;
    addr.value = realURL;
    setLoading(true);
    frame.src = url;
    updateNavButtons();
  }

  function reload() {
    if (frame.src && frame.src !== "about:blank") {
      setLoading(true);
      frame.src = frame.src;
    }
  }

  function goHome() {
    frame.src = "about:blank";
    addr.value = "";
    showOverlay();
    statusLeft.textContent = "Ready";
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────
  let progressTimer;
  function setLoading(v) {
    isLoading = v;
    clearInterval(progressTimer);
    if (v) {
      let w = 10;
      progress.style.width = w + "%";
      progress.classList.add("loading");
      progressTimer = setInterval(() => {
        if (w < 85) { w += Math.random() * 8; progress.style.width = Math.min(w, 85) + "%"; }
      }, 300);
    } else {
      progress.style.width = "100%";
      setTimeout(() => { progress.classList.remove("loading"); progress.style.width = "0%"; }, 400);
    }
  }

  function finishLoading(title) {
    setLoading(false);
    statusLeft.textContent = title ? "✓ " + title : "✓ Done";
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = "block";
    showOverlay();
    setLoading(false);
    statusLeft.textContent = "Error";
  }

  function showOverlay() { overlay.classList.remove("hidden"); }
  function hideOverlay()  { overlay.classList.add("hidden"); errorMsg.style.display = "none"; }

  function updateNavButtons() {
    btnBack.disabled = historyIdx <= 0;
    btnFwd.disabled  = historyIdx >= history.length - 1;
  }

  // ── Events ──────────────────────────────────────────────────────────────────
  addr.addEventListener("keydown", (e) => {
    if (e.key === "Enter") navigate(addr.value);
  });

  document.getElementById("go-btn").addEventListener("click", () => navigate(addr.value));
  btnBack.addEventListener("click", goBack);
  btnFwd.addEventListener("click",  goForward);
  btnReload.addEventListener("click", reload);
  document.getElementById("btn-home").addEventListener("click", goHome);

  document.querySelectorAll(".quick-link").forEach(el => {
    el.addEventListener("click", () => navigate(el.dataset.url));
  });

  // Frame load / error
  frame.addEventListener("load", () => {
    if (!frame.src || frame.src === "about:blank") return;
    let title = "";
    try { title = frame.contentDocument?.title || ""; } catch {}
    finishLoading(title || addr.value);
  });

  frame.addEventListener("error", () => {
    finishLoading();
    showError("Failed to load page — check the URL or your proxy config.");
  });

  // Listen for messages from proxied pages (navigation interception)
  window.addEventListener("message", (e) => {
    if (e.origin !== PROXY && e.origin !== window.location.origin) return;
    const { type, url } = e.data || {};
    if (type === "PROXY_NAV" && url) {
      const real = new URL(url).searchParams.get("url") || url;
      addr.value = real;
      history.splice(historyIdx + 1);
      history.push(url);
      historyIdx = history.length - 1;
      updateNavButtons();
      setLoading(true);
      frame.src = url;
      statusLeft.textContent = "Navigating…";
    }
    if (type === "PROXY_URL" && url) {
      try { addr.value = new URL(url).searchParams.get("url") || url; } catch {}
    }
  });
</script>
</body>
</html>
