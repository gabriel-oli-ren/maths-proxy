<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathSupport Proxy</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0a0e17;
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .toolbar {
      background: #0f1420;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #2a303c;
    }
    .address-bar {
      flex: 1;
      display: flex;
      background: #1a1f2e;
      border-radius: 24px;
      padding: 6px 12px;
    }
    .address-input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 0.9rem;
      outline: none;
    }
    button {
      background: #1a1f2e;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .content {
      flex: 1;
      position: relative;
      overflow: auto;
    }
    iframe {
      display: none;
    }
    /* El contenido se inyectará directamente aquí */
    #page-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
<div class="toolbar">
  <button id="back">←</button>
  <button id="forward">→</button>
  <button id="reload">⟳</button>
  <div class="address-bar">
    <div>🌐</div>
    <input type="text" id="address" class="address-input" placeholder="URL o búsqueda">
  </div>
  <button id="new-tab">+</button>
</div>
<div class="content" id="content">
  <div id="page-container"></div>
</div>

<script>
  // ================= CONFIG =================
  const WORKER_URL = 'https://search.mathssupport.cat';
  let currentUrl = 'https://example.com';
  
  const addressInput = document.getElementById('address');
  const pageContainer = document.getElementById('page-container');
  const backBtn = document.getElementById('back');
  const forwardBtn = document.getElementById('forward');
  const reloadBtn = document.getElementById('reload');
  const newTabBtn = document.getElementById('new-tab');
  
  // Historial simple (por ahora sin pestañas múltiples reales)
  let historyStack = [currentUrl];
  let historyIndex = 0;
  
  function updateAddressBar(url) {
    addressInput.value = url;
  }
  
  function loadUrl(url, addToHistory = true) {
    if (!url.startsWith('http')) url = 'https://' + url;
    currentUrl = url;
    updateAddressBar(url);
    if (addToHistory) {
      historyStack = historyStack.slice(0, historyIndex + 1);
      historyStack.push(url);
      historyIndex++;
    }
    // Navegar mediante Service Worker: simplemente cambiamos window.location
    // El SW interceptará la navegación
    window.location.href = `${WORKER_URL}/?url=${encodeURIComponent(url)}`;
  }
  
  // Control de navegación
  window.addEventListener('popstate', (event) => {
    if (event.state && event.state.url) {
      currentUrl = event.state.url;
      loadUrl(currentUrl, false);
    }
  });
  
  // Eventos UI
  addressInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') loadUrl(addressInput.value);
  });
  reloadBtn.onclick = () => loadUrl(currentUrl, false);
  backBtn.onclick = () => {
    if (historyIndex > 0) {
      historyIndex--;
      loadUrl(historyStack[historyIndex], false);
    }
  };
  forwardBtn.onclick = () => {
    if (historyIndex < historyStack.length - 1) {
      historyIndex++;
      loadUrl(historyStack[historyIndex], false);
    }
  };
  newTabBtn.onclick = () => {
    window.open(window.location.href, '_blank');
  };
  
  // Cargar página inicial
  loadUrl('https://example.com');
</script>

<!-- Service Worker registration -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
      console.log('SW registrado', reg);
      // Forzar claim para que tome control inmediato
      if (reg.active) {
        navigator.serviceWorker.controller?.postMessage({type: 'CLAIM'});
      }
    }).catch(err => console.error('SW error', err));
  }
</script>
</body>
</html>
